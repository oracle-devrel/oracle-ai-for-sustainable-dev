debug: ${SPRING_BOOT_DEBUG:false}

spring:
  application:
    name: springboot-oracle-db-otel-demo
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DB_URL:jdbc:oracle:thin:@financialdb_high?TNS_ADMIN=/path/to/Wallet_financialdb}
    username: ${DB_USERNAME:financial}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:4}
      data-source-properties:
        "[oracle.jdbc.provider.traceEventListener]": observability-trace-event-listener-provider
        "[oracle.jdbc.provider.traceEventListener.unique_identifier]": ${ORACLE_JDBC_TRACE_LISTENER_NAME:springboot-oracle-db-otel-demo}
        "[oracle.jdbc.serverTelemetryTracesEnabled]": ${ORACLE_JDBC_SERVER_TELEMETRY_TRACES_ENABLED:true}
        "[oracle.jdbc.serverTelemetryMetricsEnabled]": ${ORACLE_JDBC_SERVER_TELEMETRY_METRICS_ENABLED:false}
        "[oracle.jdbc.serverTelemetryLoggingEnabled]": ${ORACLE_JDBC_SERVER_TELEMETRY_LOGGING_ENABLED:false}

demo:
  oracle:
    server-telemetry:
      traces-enabled: ${ORACLE_JDBC_SERVER_TELEMETRY_TRACES_ENABLED:true}
      logging-enabled: ${ORACLE_JDBC_SERVER_TELEMETRY_LOGGING_ENABLED:false}
      traceparent-client-info-enabled: ${ORACLE_JDBC_TRACEPARENT_CLIENT_INFO_ENABLED:true}
      tracelevel-client-info-enabled: ${ORACLE_JDBC_TRACELEVEL_CLIENT_INFO_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACE_SAMPLE_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
