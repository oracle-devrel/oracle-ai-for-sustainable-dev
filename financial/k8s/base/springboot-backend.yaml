apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-backend
  namespace: financial
  labels:
    app.kubernetes.io/name: springboot-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: springboot-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: springboot-backend
    spec:
      volumes:
        - name: wallet
          secret:
            secretName: financialdb-wallet-secret
      containers:
        - name: springboot-backend
          image: financial/springboot-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: financialdb-credentials
                  key: password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: financialdb-credentials
                  key: password
          volumeMounts:
            - name: wallet
              mountPath: /oraclefinancial/creds
              readOnly: true
          readinessProbe:
            httpGet:
              path: /financial/test
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /financial/test
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: globallydistributeddatabase
  namespace: financial
  labels:
    app.kubernetes.io/name: springboot-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: springboot-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
