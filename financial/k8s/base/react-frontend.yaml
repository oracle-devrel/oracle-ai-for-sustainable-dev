apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: financial
  labels:
    app.kubernetes.io/name: react-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: react-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: react-frontend
    spec:
      containers:
        - name: react-frontend
          image: financial/react-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: react-frontend
  namespace: financial
  labels:
    app.kubernetes.io/name: react-frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: react-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
