apiVersion: apps/v1
kind: Deployment
metadata:
  name: microtx-transfer
  namespace: financial
  labels:
    app.kubernetes.io/name: microtx-transfer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microtx-transfer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microtx-transfer
    spec:
      containers:
        - name: microtx-transfer
          image: financial/microtx-transfer:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SPRING_MICROTX_LRA_COORDINATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: OTMM_COORDINATOR_URL
            - name: SPRING_MICROTX_LRA_PARTICIPANT_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: TRANSFER_PARTICIPANT_URL
            - name: ACCOUNT_DEPOSIT_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: ACCOUNT_DEPOSIT_URL
            - name: ACCOUNT_WITHDRAW_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: ACCOUNT_WITHDRAW_URL
            - name: TRANSFER_CANCEL_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: TRANSFER_CANCEL_URL
            - name: TRANSFER_CANCEL_PROCESS_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: TRANSFER_CANCEL_PROCESS_URL
            - name: TRANSFER_CONFIRM_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: TRANSFER_CONFIRM_URL
            - name: TRANSFER_CONFIRM_PROCESS_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: TRANSFER_CONFIRM_PROCESS_URL
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: transfer
  namespace: financial
  labels:
    app.kubernetes.io/name: microtx-transfer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: microtx-transfer
  ports:
    - name: http
      port: 8081
      targetPort: http
