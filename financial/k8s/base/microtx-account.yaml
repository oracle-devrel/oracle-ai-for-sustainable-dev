apiVersion: apps/v1
kind: Deployment
metadata:
  name: microtx-account
  namespace: financial
  labels:
    app.kubernetes.io/name: microtx-account
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microtx-account
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microtx-account
    spec:
      volumes:
        - name: wallet
          secret:
            secretName: financialdb-wallet-secret
      containers:
        - name: microtx-account
          image: financial/microtx-account:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: financialdb-credentials
                  key: password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: financialdb-credentials
                  key: password
            - name: SPRING_MICROTX_LRA_COORDINATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: OTMM_COORDINATOR_URL
            - name: SPRING_MICROTX_LRA_PARTICIPANT_URL
              valueFrom:
                configMapKeyRef:
                  name: financial-config
                  key: ACCOUNT_PARTICIPANT_URL
          volumeMounts:
            - name: wallet
              mountPath: /oraclefinancial/creds
              readOnly: true
          readinessProbe:
            httpGet:
              path: /accounts/accounts
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: account
  namespace: financial
  labels:
    app.kubernetes.io/name: microtx-account
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: microtx-account
  ports:
    - name: http
      port: 8080
      targetPort: http
