apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-frontend-ingress
  namespace: financial
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: oracledev.ai
      http:
        paths:
          # Rule for React frontend
          - path: /financial
            pathType: Prefix
            backend:
              service:
                name: react-frontend
                port:
                  number: 80
          # Rule for accounts endpoint
          - path: /financial/mern-backend
            pathType: Prefix
            backend:
              service:
                name: mern-backend
                port:
                  number: 5000
          # Rule for accounts endpoint
          - path: /financial/accounts-api
            pathType: Prefix
            backend:
              service:
                name: account
                port:
                  number: 8080
          # Rule for transfer endpoint
          - path: /financial/transfer-api
            pathType: Prefix
            backend:
              service:
                name: transfer
                port:
                  number: 8081
          # Rule for graph endpoint
          - path: /financial/graph
            pathType: Prefix
            backend:
              service:
                name: graph
                port:
                  number: 8080
          # Rule for truecache endpoint
          - path: /financial/truecache
            pathType: Prefix
            backend:
              service:
                name: truecache
                port:
                  number: 8080
          # Rule for gdd_spatial endpoint
          - path: /financial/api
            pathType: Prefix
            backend:
              service:
                name: globallydistributeddatabase
                port:
                  number: 8080
          # Rule for kafka endpoint
          - path: /financial/kafka
            pathType: Prefix
            backend:
              service:
                name: kafka
                port:
                  number: 8080
          # Rule for aiagent endpoint
          - path: /financial/aiagent
            pathType: Prefix
            backend:
              service:
                name: aiagent
                port:
                  number: 8080
          # Rule for selectai endpoint
          - path: /financial/selectai
            pathType: Prefix
            backend:
              service:
                name: selectai
                port:
                  number: 8080
          # Rule for grafana endpoint
          - path: /financial/grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-manual
                port:
                  number: 80
