server:
  port: ${DEEPSEC_PORT:8080}

spring:
  application:
    name: deep-data-security-provider-version
  datasource:
    url: ${DEEPSEC_JDBC_URL:}
    username: ${DEEPSEC_USERNAME:}
    password: ${DEEPSEC_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${DEEPSEC_ENTRA_JWT_ISSUER_URI:https://login.microsoftonline.com/${DEEPSEC_ENTRA_TENANT_ID:}/v2.0}
      client:
        registration:
          entra:
            client-name: entra
            client-id: ${DEEPSEC_ENTRA_CLIENT_ID:}
            client-secret: ${DEEPSEC_ENTRA_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: client_credentials
            scope: ${DEEPSEC_ENTRA_DATABASE_SCOPE:}
        provider:
          entra:
            authorization-uri: https://login.microsoftonline.com/${DEEPSEC_ENTRA_TENANT_ID:}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${DEEPSEC_ENTRA_TENANT_ID:}/oauth2/v2.0/token

logging:
  level:
    root: INFO

deepsec:
  ucp:
    connection-pool-name: ${DEEPSEC_UCP_POOL_NAME:DeepDataSecurityProviderUcpPool}
    initial-pool-size: ${DEEPSEC_UCP_INITIAL_POOL_SIZE:1}
    min-pool-size: ${DEEPSEC_UCP_MIN_POOL_SIZE:1}
    max-pool-size: ${DEEPSEC_POOL_SIZE:4}
  jdbc-provider:
    end-user-security-context: ojdbc-provider-spring-end-user-security-context
    registration-id: entra
    # Optional fixed data roles and attributes can be added here when needed.
    # data-roles: HRAPP_EMPLOYEES
    # end-user-context-attributes: '{"hr.emp_ctx":{"id":100}}'
  sql: ${DEEPSEC_SQL:select employee_id || ':' || first_name || ' ' || last_name from hr.employees fetch first 10 rows only}
  session-init-sql: ${DEEPSEC_SESSION_INIT_SQL:alter session disable parallel query}
  browser:
    tenant-id: ${DEEPSEC_ENTRA_TENANT_ID:}
    client-id: ${DEEPSEC_ENTRA_BROWSER_CLIENT_ID:${DEEPSEC_ENTRA_CLIENT_ID:}}
    scope: ${DEEPSEC_ENTRA_APPLICATION_SCOPE:}
